<!-- ============================================================ -->
<!-- GISCUS COMMENT SYSTEM                                        -->
<!-- Dark/Light mode ke saath automatically theme change hota hai -->
<!-- Jab deploy karo tab REPO_ID aur CATEGORY_ID fill karna      -->
<!-- ============================================================ -->

{% if page.meta.comments %}
<h2 id="__comments">{{ lang.t("meta.comments") }}</h2>

<!-- Giscus comment script -->
<script src="https://giscus.app/client.js"
  data-repo="rmszk/rmszk.github.io"
  data-repo-id="R_kgDOS6mEvQ"
  data-category="Announcements"
  data-category-id="DIC_kwDOS6mEvc4C_bQl"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-input-position="top"
  data-theme="light"
  data-lang="en"
  crossorigin="anonymous"
  async>
</script>

<!-- Dark/Light mode ke saath Giscus theme sync karo -->
<script>
  var giscus = document.querySelector("script[src*=giscus]")

  // Page load pe palette check karo
  var palette = __md_get("__palette")
  if (palette && typeof palette.color === "object") {
    var theme = palette.color.scheme === "slate"
      ? "transparent_dark"   // 🌙 dark mode
      : "light"              // ☀️ light mode
    giscus.setAttribute("data-theme", theme)
  }

  // Toggle karo toh Giscus bhi switch ho
  document.addEventListener("DOMContentLoaded", function() {
    var ref = document.querySelector("[data-md-component=palette]")
    ref.addEventListener("change", function() {
      var palette = __md_get("__palette")
      if (palette && typeof palette.color === "object") {
        var theme = palette.color.scheme === "slate"
          ? "transparent_dark"   // 🌙 dark mode
          : "light"              // ☀️ light mode

        // Giscus iframe ko theme change karo
        var frame = document.querySelector(".giscus-frame")
        frame.contentWindow.postMessage(
          { giscus: { setConfig: { theme } } },
          "https://giscus.app"
        )
      }
    })
  })
</script>
{% endif %}
